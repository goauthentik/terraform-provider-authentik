name: outpost acceptance stress

on:
  push:
    branches:
      - sdko/fix-test
  pull_request:
    branches:
      - update-2026.5
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outpost:
    name: TestAccResourceOutpost x10
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          repository: goauthentik/authentik
          ref: sdko/fix-outpost-delete-405
          path: authentik-source
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Prepare authentik compose env
        run: |
          pg_pass="$(openssl rand -base64 32)"
          secret_key="$(openssl rand -base64 40)"
          bootstrap_token="$(openssl rand -base64 32)"
          bootstrap_password="$(openssl rand -base64 32)"

          echo "::add-mask::${pg_pass}"
          echo "::add-mask::${secret_key}"
          echo "::add-mask::${bootstrap_token}"
          echo "::add-mask::${bootstrap_password}"

          {
            echo "PG_PASS=${pg_pass}"
            echo "AUTHENTIK_SECRET_KEY=${secret_key}"
            echo "AUTHENTIK_ERROR_REPORTING__ENABLED=true"
            echo "AUTHENTIK_ERROR_REPORTING__ENVIRONMENT=goauthentik-terraform-ci"
            echo "AUTHENTIK_DISABLE_UPDATE_CHECK=true"
            echo "AUTHENTIK_DISABLE_STARTUP_ANALYTICS=true"
            echo "AUTHENTIK_BOOTSTRAP_TOKEN=${bootstrap_token}"
            echo "AUTHENTIK_BOOTSTRAP_PASSWORD=${bootstrap_password}"
            echo "AUTHENTIK_IMAGE=ghcr.io/goauthentik/server"
            echo "AUTHENTIK_TAG=sdko-fix-outpost-delete-405"
            echo "AUTHENTIK_OUTPOSTS__DOCKER_IMAGE_BASE=ghcr.io/goauthentik/dev-%(type)s:gh-next"
            echo "CI=true"
          } > authentik-source/lifecycle/container/.env
          {
            echo "AUTHENTIK_BOOTSTRAP_TOKEN=${bootstrap_token}"
            echo "AUTHENTIK_BOOTSTRAP_PASSWORD=${bootstrap_password}"
            echo "COMPOSE_PROJECT_NAME=authentik"
          } >> "${GITHUB_ENV}"
      - name: Build authentik from source branch
        working-directory: authentik-source
        run: |
          docker buildx build \
            --load \
            --build-arg GIT_BUILD_HASH="$(git rev-parse --short HEAD)" \
            --build-arg VERSION="sdko-fix-outpost-delete-405" \
            --tag ghcr.io/goauthentik/server:sdko-fix-outpost-delete-405 \
            --file lifecycle/container/Dockerfile \
            .
      - name: Start authentik from source branch
        run: |
          export COMPOSE_PROJECT_NAME=authentik
          docker compose \
            --env-file authentik-source/lifecycle/container/.env \
            -f authentik-source/lifecycle/container/compose.yml \
            up -d --wait
      - name: Wait for authentik API
        timeout-minutes: 10
        run: |
          export COMPOSE_PROJECT_NAME=authentik
          until [ "$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${AUTHENTIK_BOOTSTRAP_TOKEN}" \
            http://localhost:9000/api/v3/root/config/)" = "200" ]; do
            docker compose \
              --env-file authentik-source/lifecycle/container/.env \
              -f authentik-source/lifecycle/container/compose.yml \
              ps
            sleep 5
          done
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: latest
          terraform_wrapper: false
      - name: Stress outpost acceptance test
        timeout-minutes: 20
        env:
          AUTHENTIK_URL: http://localhost:9000
          TF_ACC: "1"
        run: |
          export AUTHENTIK_TOKEN="${AUTHENTIK_BOOTSTRAP_TOKEN}"
          go test -v -p 1 -race -cover -coverprofile=coverage.txt -covermode=atomic -timeout 20m ./pkg/provider -run '^TestAccResourceOutpost$' -count=10 2>&1 | tee test-output
      - if: ${{ always() }}
        run: |
          go tool github.com/jstemmer/go-junit-report/v2 -in test-output -set-exit-code -iocopy -out junit.xml
      - name: authentik container logs
        if: ${{ always() }}
        run: |
          docker ps -a
          for container in $(docker ps -aq); do
            echo "::group::docker logs ${container}"
            docker logs --timestamps "${container}"
            echo "::endgroup::"
          done
      - if: ${{ always() }}
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        with:
          paths: junit.xml
          show: "fail"
